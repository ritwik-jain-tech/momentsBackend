# Local development — use with:
#   SPRING_PROFILES_ACTIVE=local
#   or: mvn spring-boot:run -Dspring-boot.run.profiles=local
#
# Production defaults stay in application.properties; this file overrides only local URLs.

app.environment=DEV

# Face-tagging service (run your Python/FastAPI app on this port, e.g. 8081 or 5000)
face.tagging.service.url=http://127.0.0.1:8081

# Optional: override from shell without editing this file:
#   export FACE_TAGGING_SERVICE_URL=http://localhost:5000
#
# Google Drive import (local): use the same service account as Firebase — reliable for server-side
# calls. Share the Drive folder with the SA email (client_email in the JSON). API keys restricted to
# "HTTP referrers" do not work from Java; unset GOOGLE_DRIVE_API_KEY if you still see API_KEY_INVALID.
google.drive.prefer-service-account=true
google.drive.credentials.path=src/main/resources/serviceAccountKey.json
